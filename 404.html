<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <meta name="theme-color" content="#007bff">
  <title>Page Not Found | TABANJI</title>
  <meta name="description" content="The requested TABANJI page could not be found.">
  <link rel="icon" href="icons/tabanji-192.png" type="image/png">
  <link rel="stylesheet" href="css/404.css">
  <script src="js/404.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>
  <header class="site-header">
    <div class="shell header-inner">
      <a class="logo" href="index.html" aria-label="TABANJI home">TABANJI</a>
      <button id="themeToggle" type="button" aria-label="Switch to dark theme" aria-pressed="false">☾</button>
    </div>
  </header>
  <main id="main" class="shell error-page">
    <section class="error-card" aria-labelledby="errorTitle">
      <p class="error-code" aria-hidden="true">404</p>
      <h1 id="errorTitle">Page not found</h1>
      <p>The address may be incorrect, or the page may have moved.</p>
      <form class="search" action="search.html" method="get" role="search">
        <label for="notFoundSearch">Search TABANJI products</label>
        <div>
          <input id="notFoundSearch" name="q" type="search" autocomplete="off" placeholder="Product, brand or SKU">
          <button type="submit">Search</button>
        </div>
      </form>
      <nav class="actions" aria-label="Page recovery options">
        <a class="primary" href="index.html">Go to home</a>
        <a class="secondary" href="catalog.html">Open catalog</a>
      </nav>
    </section>
  </main>
  <footer><div class="shell">© 2026 TABANJI. Demo marketplace.</div></footer>
</body>
</html>

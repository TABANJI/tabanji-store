<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog - TABANJI</title>
    <style>
        /* Базові налаштування для стабільності */
        * { box-sizing: border-box; }
        html { overflow-y: scroll; } 
        :root { --primary: #007bff; --bg: #f4f4f9; --text: #333; --nav: #ffffff; --border: #eee; }
        .dark-mode { --primary: #3795ff; --bg: #121212; --text: #ffffff; --nav: #1e1e1e; --border: #333; }
        
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 100px; transition: 0.3s; }
        
        /* Обгортка для центрування контенту на ПК */
        .wrapper { max-width: 1000px; margin: 0 auto; }

        nav { background: var(--nav); padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; }
        .burger { cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
        .burger span { width: 28px; height: 3px; background: var(--text); border-radius: 2px; }
        .logo { color: var(--primary); font-size: 26px; font-weight: 800; text-decoration: none; margin-left: 15px; }
        
        .side-menu { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: var(--nav); z-index: 9999; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.2); padding-top: 80px; overflow-x: hidden; }
        .side-menu a { padding: 20px 30px; text-decoration: none; font-size: 20px; color: var(--text); display: block; border-bottom: 1px solid var(--border); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 40px; cursor: pointer; }
        
        /* Гнучка сітка товарів */
        .product-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
            padding: 20px; 
        }

        /* Налаштування колонок для різних екранів */
        @media (min-width: 600px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 900px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }

        .card { background: var(--nav); padding: 25px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .wish-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 24px; }
        .price { font-weight: bold; font-size: 20px; color: var(--primary); display: block; margin: 10px 0; }
        .btn-buy { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 18px; font-weight: 600; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .bottom-nav a { text-decoration: none; color: #777; font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
        .bottom-nav a.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="sideNav" class="side-menu">
        <span class="close-btn" onclick="toggleMenu(0)">&times;</span>
        <a href="index.html">🏠 Home</a>
        <a href="catalog.html">📂 Catalog</a>
        <a href="new.html">✨ New Arrivals</a>
        <div style="padding: 30px;">
            <button onclick="toggleTheme()" style="width: 100%; padding: 15px; cursor: pointer; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px;">🌓 Toggle Theme</button>
        </div>
    </div>

    <nav>
        <div class="burger" onclick="toggleMenu(280)"><span></span><span></span><span></span></div>
        <a href="index.html" class="logo">TABANJI</a>
    </nav>

    <div class="wrapper">
        <main>
            <h2 style="padding: 20px 20px 0; font-size: 24px;">Product Catalog</h2>
            <div class="product-grid">
                <div class="card">
                    <span class="wish-btn" onclick="addToWish('iPhone 16 Pro')">🤍</span>
                    <div style="font-size: 40px; margin-bottom: 10px;">📱</div>
                    <span style="font-size: 18px; font-weight: 600;">iPhone 16 Pro</span>
                    <span class="price">$1,199</span>
                    <button class="btn-buy" onclick="addToCart('iPhone 16 Pro', 1199)">Buy</button>
                </div>
                <div class="card">
                    <span class="wish-btn" onclick="addToWish('MacBook Air M3')">🤍</span>
                    <div style="font-size: 40px; margin-bottom: 10px;">💻</div>
                    <span style="font-size: 18px; font-weight: 600;">MacBook Air M3</span>
                    <span class="price">$1,299</span>
                    <button class="btn-buy" onclick="addToCart('MacBook Air M3', 1299)">Buy</button>
                </div>
            </div>
        </main>
    </div>

    <div class="bottom-nav">
        <a href="index.html"><span>🏠</span> Home</a>
        <a href="catalog.html" class="active"><span>📂</span> Catalog</a>
        <a href="cart.html"><span>🛒</span> Cart</a>
        <a href="wishlist.html"><span>🤍</span> Wishlist</a>
        <a href="chat.html"><span>💬</span> Chat</a>
    </div>

    <script>
        function toggleMenu(w) { document.getElementById("sideNav").style.width = w + "px"; }
        function addToCart(name, price) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let existingItem = cart.find(item => item.name === name);
            if (existingItem) existingItem.quantity = (existingItem.quantity || 1) + 1;
            else cart.push({ name: name, price: price, quantity: 1 });
            localStorage.setItem('cart', JSON.stringify(cart));
            alert(name + " added to cart!");
        }
        function addToWish(name) {
            let wish = JSON.parse(localStorage.getItem('wish') || '[]');
            if(!wish.includes(name)) wish.push(name);
            localStorage.setItem('wish', JSON.stringify(wish));
            alert(name + " added to wishlist!");
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    </script>
</body>
</html>

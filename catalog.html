<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Browse TABANJI product departments and subcategories in one compact catalog.">
  <meta name="tabanji-catalog-version" content="7">
  <title>Catalog of Products | TABANJI</title>
  <link rel="canonical" href="catalog.html">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23007bff'/><text x='32' y='43' text-anchor='middle' font-size='34' fill='white'>T</text></svg>">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Catalog of Products | TABANJI">
  <meta property="og:description" content="Browse TABANJI departments and find the right product category.">
  <meta property="og:url" content="catalog.html">
  <meta property="og:image" content="images/og-tabanji-placeholder.jpg">
  <meta name="theme-color" content="#007bff">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
  <link rel="stylesheet" href="css/catalog-browser.css?v=7">
  <link rel="stylesheet" href="css/catalog.css?v=7">
  <link rel="stylesheet" href="css/mobile-navigation.css">
  <link rel="stylesheet" href="css/pwa.css">
  <script src="data/categories.js" defer></script>
  <script src="data/products.js" defer></script>
  <script src="js/catalog-repository.js" defer></script>
  <script src="js/store.js" defer></script>
  <script src="js/catalog-browser-core.js?v=7" defer></script>
  <script src="js/catalog.js?v=7" defer></script>
  <script src="js/pwa.js" defer></script>
</head>
<body class="catalog-page">
  <a class="skip-link" href="#catalogDepartments">Skip to departments</a>

  <div class="catalog-page-shell">
    <header class="catalog-mobile-header" data-catalog-ui-version="7">
      <button class="catalog-page-close" id="closeCatalog" type="button" aria-label="Back from catalog">‹</button>
      <h1>Catalog of products</h1>
      <span class="catalog-header-spacer" aria-hidden="true"></span>
    </header>

    <main class="catalog-browser-layout" id="mainContent">
      <nav class="catalog-department-rail" id="catalogDepartments" aria-label="Product departments">
        <div class="catalog-browser-departments" id="departmentList" role="tablist" aria-orientation="vertical">
          <button class="catalog-browser-department" type="button" aria-selected="true" disabled>Loading catalog</button>
          <button class="catalog-browser-department" type="button" aria-selected="false" disabled>Departments</button>
        </div>
      </nav>

      <section class="catalog-subcategory-pane catalog-browser-content" id="subcategoryPane" tabindex="-1" aria-live="polite">
        <div id="subcategoryContent">
          <header class="catalog-browser-content-header">
            <p>Department</p>
            <h2>Loading catalog…</h2>
          </header>
          <div class="catalog-static-loading" role="status">
            <span>Preparing categories</span>
            <span>Loading subcategories</span>
            <span>Checking available products</span>
          </div>
          <noscript>
            <div class="catalog-load-failure">
              <strong>Catalog could not be loaded</strong>
              <a href="catalog.html">Reload</a>
            </div>
          </noscript>
        </div>
      </section>
    </main>
  </div>

  <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
    <a href="index.html">Home</a>
    <a href="catalog.html" aria-current="page">Catalog</a>
    <a href="compare.html">Compare</a>
    <a href="favorites.html">Favorites</a>
  </nav>
</body>
</html>

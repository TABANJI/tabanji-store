<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Browse TABANJI product departments and subcategories in one compact catalog.">
  <title>Catalog of Products | TABANJI</title>
  <link rel="canonical" href="catalog.html">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23007bff'/><text x='32' y='43' text-anchor='middle' font-size='34' fill='white'>T</text></svg>">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Catalog of Products | TABANJI">
  <meta property="og:description" content="Browse TABANJI departments and find the right product category.">
  <meta property="og:url" content="catalog.html">
  <meta property="og:image" content="images/og-tabanji-placeholder.jpg">
  <meta name="theme-color" content="#007bff">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
  <link rel="stylesheet" href="css/catalog.css">
  <link rel="stylesheet" href="css/mobile-navigation.css">
  <link rel="stylesheet" href="css/pwa.css">
  <script src="data/categories.js" defer></script>
  <script src="data/products.js" defer></script>
  <script src="js/catalog-repository.js" defer></script>
  <script src="js/store.js" defer></script>
  <script src="js/catalog.js" defer></script>
  <script src="js/pwa.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#catalogDepartments">Skip to departments</a>

  <main class="catalog-stage" id="mainContent">
    <section class="catalog-browser" aria-labelledby="catalogTitle">
      <header class="catalog-topbar">
        <div>
          <a class="catalog-logo" href="index.html" aria-label="TABANJI home">TABANJI</a>
          <h1 id="catalogTitle">Catalog of products</h1>
        </div>
        <button class="catalog-close" id="closeCatalog" type="button" aria-label="Close catalog">
          <span aria-hidden="true">×</span>
        </button>
      </header>

      <div class="catalog-search">
        <label class="sr-only" for="catalogSearch">Search departments and categories</label>
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m20 20-4-4"></path>
        </svg>
        <input id="catalogSearch" type="search" placeholder="Search categories" autocomplete="off">
        <button id="clearCatalogSearch" type="button" aria-label="Clear category search" hidden>×</button>
      </div>

      <div class="catalog-columns">
        <nav class="department-rail" id="catalogDepartments" aria-label="Product departments">
          <div class="department-list" id="departmentList" role="tablist" aria-orientation="vertical"></div>
        </nav>

        <section class="subcategory-pane" id="subcategoryPane" tabindex="-1" aria-live="polite">
          <div id="subcategoryContent"></div>
          <div class="catalog-empty" id="catalogEmpty" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m20 20-4-4"></path>
            </svg>
            <h2>No categories found</h2>
            <p>Try a different category name.</p>
          </div>
        </section>
      </div>
    </section>
  </main>

  <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
    <a href="index.html">Home</a>
    <a href="catalog.html" aria-current="page">Catalog</a>
    <a href="compare.html">Compare</a>
    <a href="favorites.html">Favorites</a>
  </nav>
</body>
</html>

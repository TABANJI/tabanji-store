[build]
  publish = "."

[[redirects]]
  from = "/contacts.html"
  to = "/contact.html"
  status = 301

[[redirects]]
  from = "/categories.html"
  to = "/catalog.html"
  status = 301

[[redirects]]
  from = "/new.html"
  to = "/products.html?sort=newest"
  status = 301

[[redirects]]
  from = "/profile.html"
  to = "/account.html"
  status = 301

[[redirects]]
  from = "/wishlist.html"
  to = "/favorites.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Cross-Origin-Opener-Policy = "same-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
[[headers]]
  for = "/account.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
[[headers]]
  for = "/login.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
[[headers]]
  for = "/cart.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
[[headers]]
  for = "/checkout.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
[[headers]]
  for = "/compare.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
[[headers]]
  for = "/favorites.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
[[headers]]
  for = "/search.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
[[headers]]
  for = "/offline.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

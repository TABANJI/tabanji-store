<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - TABANJI</title>
    <style>
        /* Базові налаштування */
        * { box-sizing: border-box; }
        html { overflow-y: scroll; } 
        :root { --primary: #007bff; --bg: #f4f4f9; --text: #333; --nav: #ffffff; --border: #eee; }
        .dark-mode { --primary: #3795ff; --bg: #121212; --text: #ffffff; --nav: #1e1e1e; --border: #333; }
        
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 160px; transition: 0.3s; }
        
        /* Обгортка для центрування */
        .wrapper { max-width: 600px; margin: 0 auto; width: 100%; }

        nav { background: var(--nav); padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; }
        .burger { cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
        .burger span { width: 28px; height: 3px; background: var(--text); border-radius: 2px; }
        .logo { color: var(--primary); font-size: 26px; font-weight: 800; text-decoration: none; margin-left: 15px; }
        
        .side-menu { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: var(--nav); z-index: 9999; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.2); padding-top: 80px; overflow-x: hidden; }
        .side-menu a { padding: 20px 30px; text-decoration: none; font-size: 20px; color: var(--text); display: block; border-bottom: 1px solid var(--border); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 40px; cursor: pointer; }
        
        /* Чат */
        .chat-container { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message { background: var(--nav); padding: 20px; border-radius: 18px; border: 1px solid var(--border); width: fit-content; max-width: 85%; font-size: 19px; line-height: 1.5; }
        
        /* Позиціонування вводу */
        .chat-input-area { display: flex; gap: 12px; position: fixed; bottom: 80px; width: 100%; max-width: 600px; left: 50%; transform: translateX(-50%); padding: 10px 20px; background: var(--bg); box-sizing: border-box; }
        .input-wrapper { position: relative; flex-grow: 1; }
        input { width: 100%; padding: 20px; border-radius: 14px; border: 1px solid var(--border); background: var(--nav); color: var(--text); font-size: 19px; }
        
        button { padding: 0 30px; border-radius: 14px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600; font-size: 18px; }
        .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; border: none; background: none; font-size: 24px; padding: 0 10px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .bottom-nav a { text-decoration: none; color: #777; font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
        .bottom-nav a.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="sideNav" class="side-menu">
        <span class="close-btn" onclick="toggleMenu(0)">&times;</span>
        <a href="index.html">🏠 Home</a>
        <a href="catalog.html">📂 Catalog</a>
        <a href="new.html">✨ New Arrivals</a>
        <div style="padding: 30px;">
            <button onclick="toggleTheme()" style="width: 100%; padding: 15px; cursor: pointer; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px;">🌓 Toggle Theme</button>
        </div>
    </div>

    <nav>
        <div class="burger" onclick="toggleMenu(280)"><span></span><span></span><span></span></div>
        <a href="index.html" class="logo">TABANJI</a>
    </nav>

    <div class="wrapper">
        <main class="chat-container" id="chatArea">
            <h2 style="font-size: 32px; margin: 5px 0;">💬 Support Chat</h2>
            <div class="message">Hello! How can we help you today?</div>
        </main>
    </div>

    <div class="chat-input-area">
        <div class="input-wrapper">
            <input type="text" id="chatInput" placeholder="Your message...">
            <button class="clear-btn" onclick="clearInput()">&times;</button>
        </div>
        <button onclick="sendMessage()">Send</button>
    </div>

    <div class="bottom-nav">
        <a href="index.html"><span>🏠</span> Home</a>
        <a href="catalog.html"><span>📂</span> Catalog</a>
        <a href="cart.html"><span>🛒</span> Cart</a>
        <a href="wishlist.html"><span>🤍</span> Wishlist</a>
        <a href="chat.html" class="active"><span>💬</span> Chat</a>
    </div>

    <script>
        function toggleMenu(w) { document.getElementById("sideNav").style.width = w + "px"; }
        function clearInput() { document.getElementById('chatInput').value = ""; }
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (input.value.trim() !== "") {
                const area = document.getElementById('chatArea');
                const msg = document.createElement('div');
                msg.className = 'message';
                msg.style.marginLeft = 'auto';
                msg.style.background = 'var(--primary)';
                msg.style.color = 'white';
                msg.textContent = input.value;
                area.appendChild(msg);
                input.value = "";
                window.scrollTo(0, document.body.scrollHeight);
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    </script>
</body>
</html>

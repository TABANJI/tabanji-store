<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - TABANJI</title>
    <style>
        * { box-sizing: border-box; }
        html { overflow-y: scroll; } 
        :root { --primary: #007bff; --bg: #f4f4f9; --text: #333; --nav: #ffffff; --border: #eee; }
        .dark-mode { --primary: #3795ff; --bg: #121212; --text: #ffffff; --nav: #1e1e1e; --border: #333; }
        
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 100px; transition: 0.3s; }
        
        .wrapper { max-width: 800px; margin: 0 auto; padding: 0 20px; }

        nav { background: var(--nav); padding: 15px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; }
        .burger { cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
        .burger span { width: 28px; height: 3px; background: var(--text); border-radius: 2px; }
        .logo { color: var(--primary); font-size: 26px; font-weight: 800; text-decoration: none; margin-left: 15px; }
        
        .side-menu { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: var(--nav); z-index: 9999; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.2); padding-top: 80px; overflow-x: hidden; }
        .side-menu a { padding: 20px 30px; text-decoration: none; font-size: 20px; color: var(--text); display: block; border-bottom: 1px solid var(--border); }
        .close-btn { absolute; top: 20px; right: 25px; font-size: 40px; cursor: pointer; }
        
        .card { background: var(--nav); padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .grid-row-cart { display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid var(--border); }
        
        input, select, textarea { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 16px; box-sizing: border-box; }
        .btn-order { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 18px; font-weight: 600; }
        .btn-qty { border: 1px solid var(--border); background: var(--bg); color: var(--text); width: 35px; height: 35px; cursor: pointer; border-radius: 8px; font-size: 18px; }
        .btn-remove { background: none; border: none; color: #888; cursor: pointer; font-size: 24px; font-weight: bold; }
        
        /* Виправлення вирівнювання платежів */
        .payment-option { display: flex; align-items: center; gap: 15px; padding: 10px 0; font-size: 16px; cursor: pointer; }
        .payment-option input[type="radio"] { width: 20px; height: 20px; margin: 0; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--nav); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .bottom-nav a { text-decoration: none; color: #777; font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
        .bottom-nav a.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="sideNav" class="side-menu">
        <span class="close-btn" onclick="toggleMenu(0)">&times;</span>
        <a href="index.html">🏠 Home</a>
        <a href="catalog.html">📂 Catalog</a>
        <a href="new.html">✨ New Arrivals</a>
        <div style="padding: 30px;">
            <button onclick="toggleTheme()" style="width: 100%; padding: 15px; cursor: pointer; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px;">🌓 Toggle Theme</button>
        </div>
    </div>

    <nav>
        <div class="burger" onclick="toggleMenu(280)"><span></span><span></span><span></span></div>
        <a href="index.html" class="logo">TABANJI</a>
    </nav>

    <div class="wrapper">
        <h2 style="font-size: 24px; margin: 20px 0;">Checkout</h2>
        <div class="card" id="cartSummary"></div>
        
        <div class="card">
            <h3>Shipping Method</h3>
            <select id="shipMethod" onchange="renderCheckout()">
                <option value="3">TOPSPEED LEBANON ($ 3.00)</option>
                <option value="0">FREE SHIPPING BEIRUT</option>
            </select>
        </div>

        <div class="card" id="totalsDisplay">
            <div style="display:flex; justify-content:space-between; margin-bottom: 5px;"><span>Subtotal:</span> <span id="subTotal">$0.00</span></div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; color: var(--primary);"><span>Total:</span> <span id="finalTotal">$0.00</span></div>
        </div>

        <div class="card">
            <h3>Billing Details</h3>
            <input type="text" placeholder="First Name *">
            <input type="text" placeholder="Last Name *">
            <input type="text" placeholder="Company (optional)">
            <select><option>Lebanon</option></select>
            <input type="text" placeholder="House number and street name *">
            <input type="text" placeholder="Apartment, suite, unit, etc. (optional)">
            <input type="text" placeholder="Town / City *">
            <input type="text" placeholder="Postcode / ZIP *">
            <input type="tel" placeholder="Phone Number *">
            <input type="email" placeholder="Email Address *">
            <textarea placeholder="Order notes (optional)"></textarea>
        </div>

        <div class="card">
            <h3>Payment</h3>
            <label class="payment-option"><input type="radio" name="pay" checked> Cash on delivery</label>
            <label class="payment-option"><input type="radio" name="pay"> Pay By USDT</label>
            <label class="payment-option"><input type="radio" name="pay"> Pay By Wish Money</label>
        </div>

        <button class="btn-order" onclick="alert('Order placed!')">Place Order</button>
    </div>

    <div class="bottom-nav">
        <a href="index.html"><span>🏠</span> Home</a>
        <a href="catalog.html"><span>📂</span> Catalog</a>
        <a href="cart.html" class="active"><span>🛒</span> Cart</a>
        <a href="wishlist.html"><span>🤍</span> Wishlist</a>
        <a href="chat.html"><span>💬</span> Chat</a>
    </div>

    <script>
        function toggleMenu(w) { document.getElementById("sideNav").style.width = w + "px"; }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

        function renderCheckout() {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let container = document.getElementById('cartSummary');
            let shipCost = parseFloat(document.getElementById('shipMethod').value);
            
            container.innerHTML = cart.map((item, index) => `
                <div class="grid-row-cart">
                    <button class="btn-remove" onclick="removeItem(${index})">✕</button>
                    <span style="font-weight:600;">${item.name}</span>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button class="btn-qty" onclick="updateQty(${index}, -1)">-</button>
                        <span>${item.quantity || 1}</span>
                        <button class="btn-qty" onclick="updateQty(${index}, 1)">+</button>
                    </div>
                </div>`).join('');

            let sub = cart.reduce((acc, item) => acc + (item.price * (item.quantity || 1)), 0);
            document.getElementById('subTotal').innerText = "$" + sub.toFixed(2);
            document.getElementById('finalTotal').innerText = "$" + (sub + shipCost).toFixed(2);
        }
        
        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCheckout();
        }

        function updateQty(index, change) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart[index].quantity = Math.max(1, (cart[index].quantity || 1) + change);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCheckout();
        }
        
        renderCheckout();
    </script>
</body>
</html>
